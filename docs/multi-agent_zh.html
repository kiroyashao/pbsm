<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBSM 多智能体架构</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" integrity="sha384-en/ztfPSRkGfME4KIm05joYXynqzUgbsG5nMrj/xEFAHXkeZfO3yMK8QQ+mP7p1/" crossorigin="anonymous"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #020617;
      min-height: 100vh;
      padding: 2rem;
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 2rem;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .pulse-dot {
      width: 12px;
      height: 12px;
      background: #22d3ee;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.875rem;
      margin-left: 1.75rem;
    }

    .diagram-container {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 1rem;
      border: 1px solid #1e293b;
      padding: 1.5rem;
      overflow-x: auto;
    }

    svg {
      width: 100%;
      min-width: 900px;
      display: block;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }

    .card {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 0.75rem;
      border: 1px solid #1e293b;
      padding: 1.25rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .card-dot.cyan { background: #22d3ee; }
    .card-dot.emerald { background: #34d399; }
    .card-dot.violet { background: #a78bfa; }
    .card-dot.amber { background: #fbbf24; }
    .card-dot.rose { background: #fb7185; }
    .card-dot.orange { background: #fb923c; }

    .card h3 {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .card ul {
      list-style: none;
      color: #94a3b8;
      font-size: 0.75rem;
    }

    .card li {
      margin-bottom: 0.375rem;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      color: #475569;
      font-size: 0.75rem;
    }

    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin-left: auto;
      flex-shrink: 0;
      align-items: center;
    }
    .toolbar-toggle {
      background: transparent;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      transition: color 0.2s, background 0.2s;
    }
    .toolbar-toggle:hover { color: #94a3b8; background: rgba(30, 41, 59, 0.5); }
    .toolbar-actions {
      display: none;
      gap: 0.5rem;
    }
    .toolbar.expanded .toolbar-actions { display: flex; }
    .toolbar-actions button {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.375rem 0.75rem;
      border-radius: 0.375rem;
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .toolbar-actions button:hover {
      background: rgba(51, 65, 85, 0.8);
      color: white;
      border-color: #475569;
    }

    @media print {
      body { background: #020617; padding: 1rem; }
      .toolbar { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="container" id="report-container">
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>PBSM 多智能体架构</h1>
        <div class="toolbar">
          <div class="toolbar-actions">
            <button onclick="copyAsImage(this)">📋 Copy</button>
            <button onclick="downloadPNG(this)">🖼️ PNG</button>
            <button onclick="downloadPDF(this)">📄 PDF</button>
          </div>
          <button class="toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')" title="Export options" aria-label="Export options">⋯</button>
        </div>
      </div>
      <p class="subtitle">信念同步 · 冲突协商 · 安全通信</p>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 620">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c" />
          </marker>
          <marker id="arrowhead-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- ===== ARROWS (drawn first, behind components) ===== -->

        <!-- Agent A → Communication Module (vertical down) -->
        <line x1="255" y1="180" x2="255" y2="258" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead-cyan)"/>

        <!-- Agent B → Communication Module (vertical down) -->
        <line x1="745" y1="180" x2="745" y2="258" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead-cyan)"/>

        <!-- Communication Module → Security Layer (vertical down, dashed rose) -->
        <line x1="500" y1="360" x2="500" y2="418" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead-rose)"/>

        <!-- SyncRequest: Agent A → Agent B (top arrow, right, orange solid) -->
        <line x1="440" y1="85" x2="558" y2="85" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
        <text x="500" y="78" fill="#fb923c" font-size="9" font-weight="600" text-anchor="middle">同步请求</text>

        <!-- SyncResult: Agent B → Agent A (bottom arrow, left, orange solid) -->
        <line x1="560" y1="125" x2="442" y2="125" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
        <text x="500" y="118" fill="#fb923c" font-size="9" font-weight="600" text-anchor="middle">同步结果</text>

        <!-- ===== AGENT A (left, cyan/Frontend) ===== -->
        <rect x="70" y="40" width="370" height="140" rx="6" fill="#0f172a"/>
        <rect x="70" y="40" width="370" height="140" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="255" y="68" fill="white" font-size="12" font-weight="600" text-anchor="middle">智能体 A（协调者）</text>
        <text x="255" y="92" fill="#94a3b8" font-size="9" text-anchor="middle">BeliefGraph A</text>
        <text x="255" y="110" fill="#94a3b8" font-size="9" text-anchor="middle">IntentionStack A</text>
        <text x="255" y="128" fill="#94a3b8" font-size="9" text-anchor="middle">Metacognition A</text>
        <text x="255" y="162" fill="#22d3ee" font-size="7" text-anchor="middle">协调者角色</text>

        <!-- ===== AGENT B (right, cyan/Frontend) ===== -->
        <rect x="560" y="40" width="370" height="140" rx="6" fill="#0f172a"/>
        <rect x="560" y="40" width="370" height="140" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="745" y="68" fill="white" font-size="12" font-weight="600" text-anchor="middle">智能体 B（工作者）</text>
        <text x="745" y="92" fill="#94a3b8" font-size="9" text-anchor="middle">BeliefGraph B</text>
        <text x="745" y="110" fill="#94a3b8" font-size="9" text-anchor="middle">IntentionStack B</text>
        <text x="745" y="128" fill="#94a3b8" font-size="9" text-anchor="middle">Metacognition B</text>
        <text x="745" y="162" fill="#22d3ee" font-size="7" text-anchor="middle">工作者角色</text>

        <!-- ===== COMMUNICATION MODULE (emerald/Backend, wide) ===== -->
        <rect x="70" y="260" width="860" height="100" rx="8" fill="#0f172a"/>
        <rect x="70" y="260" width="860" height="100" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="500" y="284" fill="white" font-size="12" font-weight="600" text-anchor="middle">Communication Module</text>

        <!-- ConflictDetector (rose/Security) -->
        <rect x="90" y="298" width="185" height="48" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="182" y="318" fill="white" font-size="10" font-weight="600" text-anchor="middle">ConflictDetector</text>
        <text x="182" y="334" fill="#94a3b8" font-size="8" text-anchor="middle">4 种冲突类型</text>

        <!-- NegotiationHandler (rose/Security) -->
        <rect x="295" y="298" width="185" height="48" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="387" y="318" fill="white" font-size="10" font-weight="600" text-anchor="middle">NegotiationHandler</text>
        <text x="387" y="334" fill="#94a3b8" font-size="8" text-anchor="middle">提议-反提议</text>

        <!-- SyncManager (orange/MessageBus) -->
        <rect x="500" y="298" width="185" height="48" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
        <text x="592" y="318" fill="white" font-size="10" font-weight="600" text-anchor="middle">SyncManager</text>
        <text x="592" y="334" fill="#94a3b8" font-size="8" text-anchor="middle">5 阶段管线</text>

        <!-- DelegationManager (emerald/Backend) -->
        <rect x="705" y="298" width="185" height="48" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="797" y="318" fill="white" font-size="10" font-weight="600" text-anchor="middle">DelegationManager</text>
        <text x="797" y="334" fill="#94a3b8" font-size="8" text-anchor="middle">任务路由</text>

        <!-- ===== SECURITY LAYER (rose, dashed boundary) ===== -->
        <rect x="70" y="420" width="860" height="110" rx="8" fill="transparent" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/>
        <text x="82" y="438" fill="#fb7185" font-size="9" font-weight="600">安全层</text>

        <!-- AccessController (rose) -->
        <rect x="110" y="450" width="230" height="55" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="225" y="474" fill="white" font-size="10" font-weight="600" text-anchor="middle">AccessController</text>
        <text x="225" y="492" fill="#94a3b8" font-size="8" text-anchor="middle">基于角色的访问控制</text>

        <!-- SensitiveDataFilter (rose) -->
        <rect x="660" y="450" width="230" height="55" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="775" y="474" fill="white" font-size="10" font-weight="600" text-anchor="middle">SensitiveDataFilter</text>
        <text x="775" y="492" fill="#94a3b8" font-size="8" text-anchor="middle">移除 / 脱敏 / 掩码 / 拒绝</text>

        <!-- ===== LEGEND ===== -->
        <text x="720" y="558" fill="white" font-size="9" font-weight="600">图例</text>

        <rect x="720" y="564" width="14" height="8" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
        <text x="740" y="571" fill="#94a3b8" font-size="7">智能体（前端）</text>

        <rect x="830" y="564" width="14" height="8" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
        <text x="850" y="571" fill="#94a3b8" font-size="7">后端</text>

        <rect x="720" y="576" width="14" height="8" rx="2" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1"/>
        <text x="740" y="583" fill="#94a3b8" font-size="7">安全</text>

        <rect x="830" y="576" width="14" height="8" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
        <text x="850" y="583" fill="#94a3b8" font-size="7">消息总线</text>

        <line x1="720" y1="594" x2="734" y2="594" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="740" y="597" fill="#94a3b8" font-size="7">安全边界</text>

        <line x1="830" y1="594" x2="844" y2="594" stroke="#fb923c" stroke-width="1.5"/>
        <text x="850" y="597" fill="#94a3b8" font-size="7">同步流</text>
      </svg>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-header">
          <div class="card-dot orange"></div>
          <h3>同步</h3>
        </div>
        <ul>
          <li>• SyncManager 处理信念图快照</li>
          <li>• 支持增量和全量同步</li>
          <li>• 5 阶段管线：构造→压缩→传输→验证→融合</li>
        </ul>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-dot rose"></div>
          <h3>冲突解决</h3>
        </div>
        <ul>
          <li>• 检测 4 种冲突类型：属性不匹配、关系不匹配、意图不匹配、值置信度冲突</li>
          <li>• 提议-反提议协商协议</li>
        </ul>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-dot rose"></div>
          <h3>安全</h3>
        </div>
        <ul>
          <li>• 基于角色的访问：协调者/协作者/观察者/工作者</li>
          <li>• 敏感数据过滤：移除/脱敏/掩码/拒绝</li>
        </ul>
      </div>
    </div>

    <p class="footer">
      PBSM · 多智能体通信 (M6)
    </p>
  </div>

  <script>
    async function copyAsImage(btn) {
      const orig = btn.textContent;
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        btn.textContent = '✓ Copied!';
      } catch (e) {
        btn.textContent = '✗ Failed';
      }
      setTimeout(() => btn.textContent = orig, 2000);
    }

    async function downloadPNG(btn) {
      const orig = btn.textContent;
      btn.textContent = '⏳ ...';
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const link = document.createElement('a');
        link.download = 'pbsm-multi-agent-zh.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.textContent = '✓ Done!';
      } catch (e) {
        btn.textContent = '✗ Failed';
      }
      setTimeout(() => btn.textContent = orig, 2000);
    }

    async function downloadPDF(btn) {
      const orig = btn.textContent;
      btn.textContent = '⏳ ...';
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const orientation = canvas.width > canvas.height ? 'landscape' : 'portrait';
        const pdf = new jsPDF({ orientation, unit: 'px', format: [canvas.width, canvas.height], hotfixes: ['px_scaling'] });
        pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
        pdf.save('pbsm-multi-agent-zh.pdf');
        btn.textContent = '✓ Done!';
      } catch (e) {
        btn.textContent = '✗ Failed';
      }
      setTimeout(() => btn.textContent = orig, 2000);
    }
  </script>
</body>
</html>
